<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }
        
        div:hover > p {
            display: block;
            color: red;
            background-color: thistle;
            width: 250px;
            border: 2px solid purple;
            border-radius: 15px;
        }

        div:hover {
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Hover Test</h1>
    <p>Passe o mouse abaixo para ver o efeito.</p>
    <div>
        Passe o mouse aqui
        <p>Este texto aparece ao passar o mouse sobre o div.</p>
    </div>
    <p>Fim do testeSS</p>
</body>
</html>
