<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclasses</title>
    <style>
        div {
            display: inline-block;
            background-color: lightgray;
            border: 2px solid black;
            height: 250px;
            width: 250px;
            text-align: center;
            border-radius: 20%;
        }
        div > p {
            display: none;
        }
        div:hover > p {
            display: block;
        }
        div:hover {
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div>
        01
        <p>I love this</p>
    </div>
    <div>
        02
        <p>Than!</p>
    </div>
    <div>
        03
        <p>You!</p>
    </div>
</body>
</html>
