<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandiente em CSS</title>
    <style>
        *{ /* configurações globais */
            height: 100%;
            }
        body {
            /* Aplicando um gradiente linear como fundo */
            background: linear-gradient(50deg , #FAD471, #FAB854, #E8404C,#D62680, #A02DB6, #833EBD, #574DC9);
            background-attachment: fixed; /* Mantém o fundo fixo ao rolar */
            margin: 0; /* Remove margens padrão */
        }
    </style>
</head>
<body>
    <h1>Grandiente em CSS</h1>
</body>
</html>
