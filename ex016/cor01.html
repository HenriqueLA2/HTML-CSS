<!DOCTYPE html>

<body>
    <!-- Exemplo de cores usando diferentes formatos: nomes, RGB, HSL e hexadecimal -->
    <h1 style="background-color: blue; color: white;">Exemplo de cores</h1>
    <p>Este é um exemplo de texto com diferentes cores.</p>

    <h1 style="background-color: rgb(0, 0, 255); color: rgb(255, 255, 255);">Exemplo de cores</h1>
    <p>Este é um exemplo de texto com diferentes cores.</p>

    <h1 style="background-color: hsl(240, 100%, 50%); color: hsl(0, 0, 100%);">Exemplo de cores</h1>
    <p>Este é um exemplo de texto com diferentes cores.</p>

    <h1 style="background-color: #0000ff; color: #ffffff;">Exemplo de cores</h1>
    <p>Este é um exemplo de texto com diferentes cores.</p>

    
</body>
