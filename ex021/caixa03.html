<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borda Personalizada</title>
    <style>
        body{
            background-color: lavender;
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            border: 20px solid black;
            border-image: url('img/borda.png');
            border-image-slice: 27;
            border-image-repeat: repeat;

            /* A propriedade border-image permite usar uma imagem como borda de um elemento. A imagem é dividida em nove partes (quatro cantos, quatro bordas e o centro) e aplicada ao redor do elemento. A propriedade border-image-slice define como a imagem é dividida, enquanto border-image-repeat controla como as bordas são repetidas ou esticadas. 
            Modelo short-hand:
            border-image: url('caminho/para/imagem.png') slice stretch|repeat
            */
            
        }
    </style>
</head>
<body>
    <h1>Borda Personalizada</h1>
    
</body>
</html>
